<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão de Produtos - API .NET 8</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>🚀 Gestão de Produtos - API .NET 8</h1>

      <!-- Login Section -->
      <div id="loginSection" class="login-card">
        <h3>🔐 Login</h3>
        <input type="text" id="username" placeholder="Usuário" value="admin" />
        <input
          type="password"
          id="password"
          placeholder="Senha"
          value="123456"
        />
        <button id="loginBtn">Entrar</button>
        <div id="loginError" class="error"></div>
        <small>Registe-se primeiro via Swagger ou use admin/123456</small>
      </div>

      <!-- Main content (after login) -->
      <div id="mainContent" class="main-content">
        <div class="toolbar">
          <button class="btn-primary" id="newProductBtn">+ Novo Produto</button>
          <a href="#" id="inventoryBtn" class="inventory-link"
            >📦 Consultar Inventário (SKU 123)</a
          >
          <button class="btn-primary logout-btn" id="logoutBtn">🚪 Sair</button>
        </div>
        <div id="productsGrid" class="products-grid">
          <div style="text-align: center; grid-column: 1/-1">
            Carregando produtos...
          </div>
        </div>
      </div>
    </div>

    <!-- Modal para criar/editar produto -->
    <div id="productModal" class="modal">
      <div class="modal-content">
        <h3 id="modalTitle">Novo Produto</h3>
        <input type="text" id="prodName" placeholder="Nome do produto" />
        <input
          type="number"
          id="prodPrice"
          placeholder="Preço (€)"
          step="0.01"
        />
        <input type="number" id="prodStock" placeholder="Stock" />
        <input type="hidden" id="prodId" />
        <div class="modal-buttons">
          <button class="btn-secondary" id="modalCancel">Cancelar</button>
          <button class="btn-primary" id="modalSave">Salvar</button>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
